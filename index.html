<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hype Oracle</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.js"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 0; overflow-x: hidden; }
    
    /* SIDEBAR */
    #sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: #111827; color: white; transition: 0.3s; z-index: 1000; padding-top: 60px; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
    #sidebar.active { left: 0; }
    .menu-item { padding: 15px 25px; font-size: 16px; font-weight: 600; cursor: pointer; border-bottom: 1px solid #1f2937; }
    .menu-item:active { background: #1f2937; }
    .overlay { position: fixed; display: none; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    .overlay.active { display: block; }

    /* HEADER */
    .header { position: sticky; top: 0; background: #fff; z-index: 900; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #e5e7eb; }
    .burger { font-size: 24px; cursor: pointer; padding: 5px; color: #111827; }
    .logo { font-size: 18px; font-weight: 800; color: #111827; }

    /* CONTENT */
    #app { padding: 15px; max-width: 420px; margin: 0 auto; }
    .tab-title { font-size: 20px; font-weight: 800; margin-bottom: 15px; color: #111827; }
    .card { background: #fff; border-radius: 24px; padding: 22px; box-shadow: 0 10px 25px rgba(0,0,0,0.06); margin-bottom: 16px; position: relative; }
    
    .status-badge { font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 8px; margin-bottom: 12px; display: inline-block; text-transform: uppercase; }
    .st-win { background: #d1fae5; color: #065f46; border: 1px solid #34c759; }
    .st-loss { background: #fee2e2; color: #991b1b; border: 1px solid #ff3b30; }
    .st-wait { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }

    .event-img { width: 100%; height: 160px; border-radius: 18px; object-fit: cover; margin-bottom: 14px; background: #f3f4f6; display: block; }
    .poll-container { height: 12px; background: #eee; border-radius: 6px; display: flex; overflow: hidden; margin-bottom: 10px; }
    .poll-yes { background: #34c759; transition: width 0.6s; }
    .poll-no { background: #ff3b30; transition: width 0.6s; }
    .stats-text { display: flex; justify-content: space-between; font-weight: 700; font-size: 12px; margin-bottom: 14px; color: #666; }

    input { width: 100%; height: 56px; border: 2px solid #e5e7eb; border-radius: 16px; font-size: 22px; font-weight: 700; text-align: center; outline: none; background: #f9fafb; margin-bottom: 10px; }
    input:focus { border-color: #0088cc; background: #fff; }

    .win-estimate { font-size: 13px; color: #0088cc; font-weight: 650; margin-bottom: 12px; min-height: 32px; text-align: center; line-height: 1.4; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button { padding: 16px; border-radius: 16px; border: none; color: #fff; font-size: 16px; font-weight: 850; cursor: pointer; transition: all 0.1s ease; }
    .btn-yes { background: #34c759; box-shadow: 0 4px 0 #28a745; }
    .btn-no { background: #ff3b30; box-shadow: 0 4px 0 #d93025; }
    button:active { transform: translateY(4px); box-shadow: none; }
    button:disabled { opacity: 0.5; transform: none; box-shadow: none; }

    .loading { color: #888; margin-top: 50px; text-align: center; font-weight: 600; }
    .error-msg { color: #b42318; padding: 15px; text-align: center; background: #fff; border-radius: 15px; }
  </style>
</head>
<body>

  <div class="overlay" onclick="toggleMenu()"></div>
  <div id="sidebar">
    <div class="menu-item" onclick="switchTab('active')">🔥 Актуальные пари</div>
    <div class="menu-item" onclick="switchTab('history')">📊 Моя История</div>
    <div class="menu-item" onclick="switchTab('archive')">📂 Архив событий</div>
  </div>

  <div class="header">
    <div class="burger" onclick="toggleMenu()">☰</div>
    <div class="logo">Hype Oracle</div>
    <div id="ton-connect"></div>
  </div>

  <div id="app">
    <div id="current-tab-title" class="tab-title">Актуальные пари</div>
    <div id="content"><div class="loading">Загрузка данных...</div></div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: 'https://footballtv993-del.github.io/Index1/tonconnect-manifest.json',
      buttonRootId: 'ton-connect'
    });

    const CONTRACT = "EQB7MjT_ZRAG9TIrb7dzJJ5ETGD-i1z6_aDozrS0BQSqqGkh";
    const REFRESH_MS = 15000;
    const MIN_BET = 0.20;
    
    let eventList = [];
    let userBets = [];
    let currentTab = 'active';
    let refreshTimer = null;
    const state = new Map();

    // === ТЕХНІЧНІ ФУНКЦІЇ ОРИГІНАЛУ ===
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
      document.querySelector('.overlay').classList.toggle('active');
    }

    function switchTab(tab) {
      currentTab = tab;
      const titles = { active: 'Актуальные пари', history: 'Моя История', archive: 'Архив событий' };
      document.getElementById('current-tab-title').textContent = titles[tab];
      toggleMenu();
      renderApp();
    }

    function safeBase64ToJson(b64) {
      try {
        return JSON.parse(decodeURIComponent(escape(window.atob((b64 || "").replace(/-/g, "+").replace(/_/g, "/")))));
      } catch (e) { return null; }
    }

    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    // === РОБОТА З БЛОКЧЕЙНОМ (ОРИГІНАЛ) ===
    async function syncAllEvents(ids) {
      if (!ids.length) return;
      const params = new URLSearchParams(window.location.search);
      const API_KEY = params.get("api");
      if (!API_KEY) return;

      const url = `https://toncenter.com/api/v2/jsonRPC?api_key=${API_KEY}`;
      
      for (const id of ids) {
        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              id: id, jsonrpc: "2.0", method: "runGetMethod",
              params: { address: CONTRACT, method: "get_event", stack: [["num", String(id)]] }
            })
          });
          const json = await res.json();
          if (json.result && json.result.stack) {
            const stack = json.result.stack;
            const yes = Number(stack[0][1]) / 1e9;
            const no = Number(stack[1][1]) / 1e9;
            const isResolved = stack[2][1] !== "0x0";
            const winOutcome = stack[3][1] !== "0x0";
            
            state.set(id, { yes, no, total: yes + no, isResolved, winOutcome });
            updateCardUI(id);
          }
        } catch (e) { console.error("Sync error:", e); }
      }
    }

    function updateCardUI(id) {
      const info = state.get(id);
      if (!info) return;

      const yP = info.total > 0 ? Math.round((info.yes / info.total) * 100) : 50;
      
      const barY = document.getElementById(`bar-y-${id}`);
      const barN = document.getElementById(`bar-n-${id}`);
      if (barY) barY.style.width = yP + "%";
      if (barN) barN.style.width = (100 - yP) + "%";

      const txtY = document.getElementById(`txt-y-${id}`);
      const txtN = document.getElementById(`txt-n-${id}`);
      if (txtY) txtY.textContent = `ДА: ${yP}% (${info.yes.toFixed(2)} T)`;
      if (txtN) txtN.textContent = `НЕТ: ${100 - yP}% (${info.no.toFixed(2)} T)`;

      renderEstimate(id);
    }

    function renderEstimate(id) {
      const est = document.getElementById(`est-${id}`);
      const input = document.getElementById(`am-${id}`);
      const info = state.get(id);
      if (!est || !info || info.isResolved) return;

      const val = parseFloat(input?.value);
      if (isNaN(val) || val < MIN_BET) {
        est.textContent = "Укажите сумму для прогноза";
        return;
      }

      const fee = 0.9; 
      const winIfYes = val + (val / (info.yes + val)) * (info.no * fee);
      const winIfNo = val + (val / (info.no + val)) * (info.yes * fee);

      est.innerHTML = `Победа ДА: ~${winIfYes.toFixed(2)} T<br>Победа НЕТ: ~${winIfNo.toFixed(2)} T`;
    }

    async function doBet(id, outcome) {
      const input = document.getElementById(`am-${id}`);
      const amount = parseFloat(input.value);
      if (isNaN(amount) || amount < MIN_BET) return alert(`Мин. ставка ${MIN_BET} TON`);

      if (!tonConnectUI.connected) return tonConnectUI.connectWallet();

      try {
        const cell = new TonWeb.boc.Cell();
        cell.bits.writeUint(0x336af5ef, 32); 
        cell.bits.writeUint(id, 64);
        cell.bits.writeUint(outcome ? 1 : 0, 1);
        
        const boc = await cell.toBoc();
        const transaction = {
          validUntil: Math.floor(Date.now() / 1000) + 360,
          messages: [{
            address: CONTRACT,
            amount: Math.floor((amount + 0.05) * 1e9).toString(),
            payload: TonWeb.utils.bytesToBase64(boc)
          }]
        };
        await tonConnectUI.sendTransaction(transaction);
      } catch (e) { alert("Ошибка транзакции"); }
    }

    // === РЕНДЕР ІНТЕРФЕЙСУ ===
    function renderApp() {
      const container = document.getElementById("content");
      container.innerHTML = "";
      
      let filtered = [];
      if (currentTab === 'active') filtered = eventList.filter(e => e.active === 1);
      else if (currentTab === 'archive') filtered = eventList.filter(e => e.active === 0);
      else if (currentTab === 'history') {
        const betIds = userBets.map(b => b.event_id);
        filtered = eventList.filter(e => betIds.includes(e.id));
      }

      if (filtered.length === 0) {
        container.innerHTML = `<div class="loading">В этом разделе пока пусто</div>`;
        return;
      }

      filtered.forEach(ev => {
        const myBet = userBets.find(b => b.event_id === ev.id);
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          ${myBet ? `
            <div class="status-badge ${myBet.win_status === 1 ? 'st-win' : myBet.win_status === 0 ? 'st-loss' : 'st-wait'}">
              ${myBet.outcome === 1 ? 'ВЫБОР: ДА' : 'ВЫБОР: НЕТ'} | 
              ${myBet.win_status === 1 ? 'ВЫИГРЫШ' : myBet.win_status === 0 ? 'ПРОИГРЫШ' : 'В ОЖИДАНИИ'}
            </div>
          ` : ''}
          <div style="font-weight:800; font-size:18px; margin-bottom:12px;">${ev.title}</div>
          ${ev.image_url ? `<img src="${ev.image_url}" class="event-img">` : ''}
          
          <div class="poll-container">
            <div id="bar-y-${ev.id}" class="poll-yes" style="width:50%"></div>
            <div id="bar-n-${ev.id}" class="poll-no" style="width:50%"></div>
          </div>
          <div class="stats-text">
            <span id="txt-y-${ev.id}">ДА: --</span>
            <span id="txt-n-${ev.id}">НЕТ: --</span>
          </div>

          ${ev.active === 1 ? `
            <input type="number" id="am-${ev.id}" placeholder="Сумма TON" inputmode="decimal">
            <div id="est-${ev.id}" class="win-estimate">Укажите сумму для прогноза</div>
            <div class="btn-grid">
              <button class="btn-yes" onclick="doBet(${ev.id}, true)">ПРОГНОЗ ДА</button>
              <button class="btn-no" onclick="doBet(${ev.id}, false)">ПРОГНОЗ НЕТ</button>
            </div>
          ` : `
            <div style="text-align:center; padding:15px; background:#fff5f5; border-radius:12px; color:#ff3b30; font-weight:800;">
              ПРИЕМ СТАВОК ЗАВЕРШЕН
            </div>
          `}
        `;
        container.appendChild(card);

        // Додаємо дебаунс на інпут
        const input = card.querySelector('input');
        if (input) {
          input.addEventListener('input', debounce(() => renderEstimate(ev.id), 300));
        }
      });

      // Запускаємо синхронізацію
      const ids = filtered.map(e => e.id);
      syncAllEvents(ids);
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => syncAllEvents(ids), REFRESH_MS);
    }

    // === START ===
    (function main() {
      const params = new URLSearchParams(window.location.search);
      const data = safeBase64ToJson(params.get("payload"));
      
      if (!data) {
        document.getElementById("content").innerHTML = `<div class="error-msg">Ошибка: Данные не найдены. Перезайдите через бота.</div>`;
        return;
      }

      eventList = data.events || [];
      userBets = data.userBets || [];
      
      renderApp();

      // Скрол до конкретної події, якщо передано ID
      const targetId = params.get("ev");
      if (targetId) {
        setTimeout(() => {
          const el = document.querySelector(`.card[data-event-id="${targetId}"]`);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 800);
      }
    })();
  </script>
</body>
</html>
