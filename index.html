<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hype Oracle</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.js"></script>

  <style>
    /* Базовые стили */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
    #app { width: 100%; max-width: 420px; }

    .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 16px; padding: 0 4px; }
    .logo { font-size: 22px; font-weight: 800; color: #111827; letter-spacing: -0.5px;}

    /* ВКЛАДКИ (TABS) */
    .tabs { display: flex; gap: 8px; width: 100%; margin-bottom: 16px; background: #fff; padding: 6px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; transition: all 0.2s ease; background: transparent; color: #6b7280; }
    .tab-btn.active { background: #111827; color: #fff; }

    /* КАРТОЧКИ И КОНТЕНТ */
    .card { background: #fff; border-radius: 24px; padding: 22px; box-shadow: 0 10px 25px rgba(0,0,0,0.06); margin-bottom: 16px; }
    h2 { font-size: 18px; color: #222; margin: 0 0 10px 0; line-height: 1.35; text-align: center; }

    /* СТАТУСЫ СТАВОК */
    .bet-status { margin: 12px 0; padding: 12px; border-radius: 16px; font-size: 14px; font-weight: 800; text-align: center; border: 2px solid #e5e7eb; }
    .bet-pending { background: #f3f4f6; color: #6b7280; border-style: dashed; }
    .bet-win { background: #ecfdf5; color: #059669; border-color: #34c759; animation: win-glow 2s infinite; }
    .bet-loss { background: #fef2f2; color: #dc2626; border-color: #ff3b30; }
    @keyframes win-glow { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

    /* Элементы UI */
    .event-img { width: 100%; height: 160px; border-radius: 18px; margin: 8px 0 14px 0; object-fit: cover; background: #f3f4f6; }
    .poll-container { height: 12px; background: #eee; border-radius: 6px; display: flex; overflow: hidden; margin-bottom: 10px; }
    .poll-yes { background: #34c759; transition: width 0.6s; }
    .poll-no { background: #ff3b30; transition: width 0.6s; }
    .stats-text { display: flex; justify-content: space-between; font-weight: 700; font-size: 12px; margin-bottom: 14px; color: #666; }
    input { width: 100%; height: 50px; border: 2px solid #e5e7eb; border-radius: 14px; font-size: 18px; font-weight: 700; text-align: center; outline: none; transition: 0.2s; }
    input:focus { border-color: #0088cc; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    button.bet-act { padding: 14px; border-radius: 14px; border: none; color: #fff; font-size: 15px; font-weight: 850; cursor: pointer; }
    .btn-yes { background: #34c759; box-shadow: 0 4px 0 #28a745; }
    .btn-no { background: #ff3b30; box-shadow: 0 4px 0 #d93025; }
    .loading { color: #888; margin-top: 50px; text-align: center; }
  </style>
</head>

<body>
  <div id="app">
    <div class="header">
      <div class="logo"><span>👑 HypeOracle</span></div>
      <div id="ton-connect"></div>
    </div>
    
    <div class="tabs">
      <button id="tab-main" class="tab-btn active" onclick="switchTab('main')">События</button>
      <button id="tab-history" class="tab-btn" onclick="switchTab('history')">Моя история</button>
    </div>

    <div id="content"></div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: 'https://footballtv993-del.github.io/Index1/tonconnect-manifest.json',
      buttonRootId: 'ton-connect'
    });

    const CONTRACT = "EQDY-ZA54ipvqiA8WeB64yI1h_2OB4M3AQxn924V0U6VwfNG";
    const REFRESH_MS = 15000;
    
    let eventList = [];
    let userBets = [];
    let currentTab = 'main';
    const state = new Map();

    // Загрузка данных
    function safeBase64ToJson(b64) {
      try {
        const jsonString = decodeURIComponent(escape(window.atob((b64 || "").replace(/-/g, "+").replace(/_/g, "/"))));
        return JSON.parse(jsonString);
      } catch (e) { return null; }
    }

    // Переключение вкладок
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      renderView();
    }

    // Отрисовка карточки
    function buildCard(event) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.eventId = String(event.id);
      card.innerHTML = `
        <h2>${event.title}</h2>
        ${event.image_url ? `<img class="event-img" src="${event.image_url}">` : ''}
        <div class="poll-container"><div class="poll-yes" id="bar-y-${event.id}"></div><div class="poll-no" id="bar-n-${event.id}"></div></div>
        <div class="stats-text"><span id="txt-y-${event.id}">ДА: --</span><span id="txt-n-${event.id}">НЕТ: --</span></div>
        <div id="bet-status-${event.id}"></div>
        <input type="number" placeholder="Сумма TON" id="am-${event.id}">
        <div class="btn-grid">
          <button class="bet-act btn-yes" onclick="doBet(${event.id}, true)">ДА</button>
          <button class="bet-act btn-no" onclick="doBet(${event.id}, false)">НЕТ</button>
        </div>
      `;
      return card;
    }

    // Логика отображения статусов
    function updateCardUI(eventId) {
      const info = state.get(eventId);
      if (!info) return;

      const total = info.yes + info.no;
      const yP = total > 0 ? Math.round((info.yes / total) * 100) : 50;
      
      const barY = document.getElementById(`bar-y-${eventId}`);
      const txtY = document.getElementById(`txt-y-${eventId}`);
      const txtN = document.getElementById(`txt-n-${eventId}`);
      
      if (barY) barY.style.width = yP + "%";
      if (txtY) txtY.innerText = `ДА: ${yP}% (${info.yes.toFixed(1)} T)`;
      if (txtN) txtN.innerText = `НЕТ: ${100-yP}% (${info.no.toFixed(1)} T)`;

      const myBet = userBets.find(b => b.event_id === eventId);
      const statusEl = document.getElementById(`bet-status-${eventId}`);
      
      if (myBet && statusEl) {
        const side = myBet.outcome === 1 ? "ДА" : "НЕТ";
        if (info.isResolved) {
          const isWin = (myBet.outcome === 1 && info.winningOutcome) || (myBet.outcome === 0 && !info.winningOutcome);
          statusEl.className = `bet-status ${isWin ? 'bet-win' : 'bet-loss'}`;
          statusEl.innerText = isWin ? `🏆 ВЫИГРЫШ! Ставка на ${side}` : `❌ ПРОИГРЫШ. Ставка на ${side}`;
        } else {
          statusEl.className = "bet-status bet-pending";
          statusEl.innerText = `⏳ Ваша ставка: ${side}`;
        }
      }
    }

    // Синхронизация с блокчейном (Toncenter)
    async function syncBlockchain() {
      const api = new URLSearchParams(window.location.search).get("api");
      const ids = eventList.map(e => e.id);
      
      for (const id of ids) {
        try {
          const res = await fetch(`https://toncenter.com/api/v2/jsonRPC?api_key=${api}`, {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({jsonrpc:"2.0", id:id, method:"runGetMethod", params:{address:CONTRACT, method:"get_event", stack:[["num", String(id)]]}})
          });
          const json = await res.json();
          const s = json.result.stack;
          state.set(id, {
            yes: parseInt(s[0][1], 16)/1e9, no: parseInt(s[1][1], 16)/1e9,
            isResolved: parseInt(s[2][1], 16) !== 0, winningOutcome: parseInt(s[3][1], 16) !== 0
          });
          updateCardUI(id);
        } catch(e) {}
      }
    }

    function renderView() {
      const container = document.getElementById("content");
      container.innerHTML = "";
      
      let list = eventList;
      if (currentTab === 'history') {
        list = eventList.filter(ev => userBets.some(b => b.event_id === ev.id));
      }

      if (list.length === 0) {
        container.innerHTML = `<div class="loading">${currentTab === 'history' ? 'У вас еще нет ставок' : 'Событий пока нет'}</div>`;
        return;
      }

      list.forEach(ev => {
        container.appendChild(buildCard(ev));
        updateCardUI(ev.id);
      });
    }

    // Инициализация
    (function main() {
      const params = new URLSearchParams(window.location.search);
      const data = safeBase64ToJson(params.get("payload"));
      if (data) {
        eventList = data.events || [];
        userBets = data.userBets || [];
        renderView();
        syncBlockchain();
        setInterval(syncBlockchain, REFRESH_MS);
      }
    })();
  </script>
</body>
</html>
